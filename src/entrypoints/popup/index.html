<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfferGod - Offer之神</title>
  <script type="module" src="./main.ts"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: background 0.3s, color 0.3s;
    }

    /* 深色主题 */
    body[data-theme="dark"] {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
    }

    body[data-theme="dark"] .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body[data-theme="dark"] .stat-label {
      color: rgba(255, 255, 255, 0.5);
    }

    body[data-theme="dark"] .brand-sub {
      color: rgba(255, 255, 255, 0.5);
    }

    body[data-theme="dark"] .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    body[data-theme="dark"] .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    body[data-theme="dark"] .tip {
      color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.03);
    }

    /* 浅色主题 */
    body[data-theme="light"] {
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      color: #1e293b;
    }

    body[data-theme="light"] .stat-card {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .stat-label {
      color: rgba(0, 0, 0, 0.5);
    }

    body[data-theme="light"] .brand-sub {
      color: rgba(0, 0, 0, 0.4);
    }

    body[data-theme="light"] .btn-secondary {
      background: rgba(0, 0, 0, 0.05);
      color: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }

    body[data-theme="light"] .btn-secondary:hover {
      background: rgba(0, 0, 0, 0.08);
    }

    body[data-theme="light"] .tip {
      color: rgba(0, 0, 0, 0.4);
      background: rgba(0, 0, 0, 0.03);
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .brand-text {
      flex: 1;
    }

    .brand-name {
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
    }

    .brand-sub {
      font-size: 10px;
      font-family: 'SF Mono', 'Consolas', monospace;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      border-radius: 8px;
      padding: 12px;
      transition: all 0.3s;
    }

    .stat-label {
      font-size: 11px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #14b8a6;
    }

    .stat-value.running {
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #14b8a6;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(20, 184, 166, 0.4);
      }
      50% {
        opacity: 0.8;
        box-shadow: 0 0 0 4px rgba(20, 184, 166, 0);
      }
    }

    .btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #14b8a6 0%, #06b6d4 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
    }

    .btn-secondary {
      transition: all 0.2s;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .tip {
      font-size: 10px;
      text-align: center;
      line-height: 1.5;
      padding: 8px;
      border-radius: 6px;
      transition: all 0.3s;
    }
  </style>
</head>
<body data-theme="dark">
  <div class="container">
    <div class="header">
      <div class="brand-icon">🎯</div>
      <div class="brand-text">
        <div class="brand-name">OfferGod</div>
        <div class="brand-sub">v1.0 · 神之加持</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">今日投递</div>
        <div class="stat-value" id="todayCount">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">引擎状态</div>
        <div class="stat-value running" id="engineStatus">
          <span class="pulse-dot"></span>
          已暂停
        </div>
      </div>
    </div>

    <button class="btn btn-primary" id="openDashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
      打开工作台
    </button>

    <button class="btn btn-secondary" id="toggleTheme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
      <span id="themeText">切换到浅色</span>
    </button>

    <div class="tip">
      💡 请在 Boss 直聘页面使用
    </div>
  </div>
</body>
</html>
